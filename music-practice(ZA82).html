<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Music Practice Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap');
:root{--bg:#faf8f5;--bg2:#f2ede6;--bg3:#ebe4da;--border:#d8cfc4;--border2:#c8bfb4;--text:#1a1612;--text2:#3d3530;--text3:#6b5f55;--text4:#6e5e54;--gold:#8b5e2a;--blue:#1a5f8a;--green:#2a7a4a;--red:#8a2a2a;--accent:#7a1f1f}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg)}
body{font-family:Arial,sans-serif;color:var(--text);display:flex;flex-direction:column;height:100vh;font-size:19px;overflow:hidden}
.hdr{display:flex;align-items:flex-end;justify-content:space-between;padding:14px 28px 12px;border-bottom:2px solid var(--accent);background:var(--accent);flex-shrink:0}
.hdr-left .sup{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,0.6);letter-spacing:3px;text-transform:uppercase;margin-bottom:3px}
.hdr-left h1{font-size:24px;font-weight:300;letter-spacing:.4px;line-height:1;color:#fff}
.hdr-left h1 em{font-style:italic;color:#f0c080}
.hdr-right{display:flex;align-items:flex-end;gap:16px}
.hdr-stats{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,0.6);text-align:right;line-height:1.9}
.hdr-stats span{color:#f0c080}
.auth-bar{display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,0.6)}
.auth-dot{width:6px;height:6px;border-radius:50%;background:#6ade90;flex-shrink:0}
.auth-dot.off{background:#ff8888}
.auth-user{color:rgba(255,255,255,0.85);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-msg{font-family:'DM Mono',monospace;font-size:10px;color:#6ade90;letter-spacing:2px;text-transform:uppercase;transition:opacity .5s;font-weight:600}
.btn-signout{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);border-radius:3px;padding:2px 8px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px}
.tabs{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 16px;gap:4px}
.tab{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:10px 18px;cursor:pointer;border:none;background:none;color:var(--text4);border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-count{display:inline-block;background:var(--border);color:var(--text4);border-radius:20px;padding:1px 7px;font-size:11px;margin-left:4px}
.tab.active .tab-count{background:var(--accent);color:#fff}
.main{display:flex;flex:1;overflow:hidden}
.left{display:flex;flex-direction:column;flex:1;overflow:hidden;border-right:1px solid var(--border)}
.left-toolbar{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);gap:10px}
.search-box{flex:1;background:#fff;border:1px solid var(--border);border-radius:5px;padding:7px 13px;font-family:Arial,sans-serif;font-size:17px;color:var(--text);outline:none;transition:border-color .2s}
.search-box:focus{border-color:var(--gold)}
.btn-add{font-family:Arial,sans-serif;font-size:14px;background:var(--accent);border:none;color:#fff;padding:7px 16px;border-radius:4px;cursor:pointer;white-space:nowrap;transition:all .2s}
.btn-add:hover{background:#5a1515}
.piece-grid-wrap{overflow-y:auto;flex:1;padding:12px}
.piece-grid-wrap::-webkit-scrollbar{width:4px}
.piece-grid-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.group-header{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text4);padding:14px 4px 8px;display:flex;align-items:center;gap:8px}
.group-header:first-child{padding-top:2px}
.group-line{flex:1;height:1px;background:var(--border)}
.group-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.piece-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:6px}
.pbtn{background:#fff;border:1px solid var(--border);border-radius:7px;padding:12px 14px;cursor:pointer;text-align:left;color:var(--text);transition:all .15s;font-family:Arial,sans-serif;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
.pbtn:hover{background:var(--bg3);border-color:var(--accent);transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,0.08)}
.pbtn.act{background:#fff8f0;border-color:var(--gold);box-shadow:0 0 0 2px #c9a96e44}
.pbtn.practiced{background:#f0faf3;border-color:#4a9e6a;box-shadow:0 0 0 2px #4a9e6a33}
.pbtn.practiced:hover{background:#e4f5ea;border-color:#3a8a58}
.pbtn.practiced.act{background:#e4f5ea;border-color:#3a8a58;box-shadow:0 0 0 2px #4a9e6a55}
.pbtn-title{font-size:16px;font-weight:600;margin-bottom:2px;line-height:1.25}
.pbtn-composer{font-size:14px;color:var(--text3);font-style:italic;margin-bottom:7px;line-height:1.2}
.pbtn-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.spill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:9px;font-family:'DM Mono',monospace;border:1px solid}
.pdf-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:3px;font-size:9px;background:#fff3e0;border:1px solid #e0a050;color:var(--gold);letter-spacing:1px;font-family:'DM Mono',monospace}
.time-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--text4)}
.right{width:400px;min-width:340px;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.detail{flex:1;overflow-y:auto;padding:22px 26px}
.detail::-webkit-scrollbar{width:3px}
.detail::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.d-title{font-size:32px;font-weight:400;line-height:1.1;background:none;border:none;border-bottom:2px solid var(--border);color:var(--text);font-family:Arial,sans-serif;width:100%;outline:none;padding-bottom:3px;margin-bottom:3px;transition:border-color .2s}
.d-title:focus{border-color:var(--accent)}
.d-composer{font-size:16px;color:var(--text3);font-style:italic;margin-bottom:20px;background:none;border:none;border-bottom:1px solid var(--border);font-family:Arial,sans-serif;width:100%;outline:none;padding-bottom:2px}
.sec-lbl{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text4);margin-bottom:9px}
.status-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px}
.schip{background:#fff;border:1px solid var(--border);border-radius:20px;padding:5px 15px;cursor:pointer;font-family:Arial,sans-serif;font-size:15px;color:var(--text3);transition:all .15s}
.schip:hover{border-color:var(--accent);color:var(--accent)}
.div{border:none;border-top:1px solid var(--border);margin:18px 0}
.score-block{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:18px}
.score-info{font-family:'DM Mono',monospace;font-size:12px;color:var(--text4);line-height:1.9;margin-bottom:10px}
.score-info span{color:var(--gold)}
.score-btns{display:flex;gap:7px;flex-wrap:wrap}
.timer-block{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:18px}
.timer-display{font-family:'DM Mono',monospace;font-size:58px;font-weight:300;letter-spacing:3px;margin:8px 0;transition:color .3s;color:#d0c8c0}
.timer-controls{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.timer-info{font-family:'DM Mono',monospace;font-size:13px;color:var(--text4);margin-top:9px;line-height:1.9}
.timer-info span{color:var(--gold)}
.btn{font-family:Arial,sans-serif;font-size:15px;letter-spacing:.5px;padding:8px 18px;border-radius:5px;cursor:pointer;border:1px solid;transition:all .2s}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn-primary:hover{background:#5a1515}
.btn-blue{background:#e8f4ff;border-color:#1a4f7a55;color:var(--blue)}
.btn-green{background:#e8f8ee;border-color:#1a5a3055;color:var(--green)}
.btn-ghost{background:#fff;border-color:var(--border2);color:var(--text3)}.btn-ghost:hover{border-color:var(--red);color:var(--red)}
.btn-neutral{background:#fff;border-color:var(--border);color:var(--text3)}.btn-neutral:hover{border-color:var(--gold);color:var(--gold)}
.btn-del{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;background:none;border:none;color:var(--border2);cursor:pointer;transition:color .2s;padding:2px 0}.btn-del:hover{color:var(--red)}
.notes{width:100%;min-height:95px;background:#fff;border:1px solid var(--border);border-radius:7px;padding:13px 15px;color:var(--text2);font-family:Arial,sans-serif;font-size:17px;line-height:1.7;resize:vertical;outline:none;transition:border-color .2s}
.notes:focus{border-color:var(--gold)}
.notes::placeholder{color:var(--border2)}
.full-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px}
.signin-clef{font-size:56px;opacity:.15;color:var(--accent)}
.full-center h2{font-weight:300;font-size:24px}
.full-center p{font-family:'DM Mono',monospace;font-size:10px;color:var(--text4);letter-spacing:2px;text-transform:uppercase}
.btn-signin{font-family:Arial,sans-serif;font-size:17px;padding:13px 34px;border-radius:7px;cursor:pointer;background:var(--accent);border:none;color:#fff;transition:all .2s;margin-top:4px}
.btn-signin:hover{background:#5a1515;transform:translateY(-1px)}
.empty-clef{font-size:44px;opacity:.15;color:var(--accent)}
.empty-msg{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text4)}
.loading-msg{font-family:'DM Mono',monospace;font-size:10px;color:var(--text4);letter-spacing:3px;text-transform:uppercase}
.overlay{position:fixed;inset:0;background:rgba(20,10,5,0.55);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;z-index:500}
.overlay.show{display:flex}
.modal{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;width:400px;box-shadow:0 16px 48px rgba(0,0,0,0.15);max-height:85vh;display:flex;flex-direction:column}
.modal h2{font-weight:400;font-size:22px;margin-bottom:20px;flex-shrink:0}
.fld{margin-bottom:14px}
.fld label{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.fld input,.fld textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:9px 13px;color:var(--text);font-family:Arial,sans-serif;font-size:16px;outline:none;transition:border-color .2s}
.fld input:focus,.fld textarea:focus{border-color:var(--gold)}
.modal-btns{display:flex;gap:8px;margin-top:18px;flex-shrink:0}
.modal-btns .btn{flex:1;text-align:center}
.pdf-modal-inner{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;width:500px;height:580px;box-shadow:0 16px 48px rgba(0,0,0,0.15);display:flex;flex-direction:column}
.pdf-modal-inner h2{font-weight:400;font-size:22px;margin-bottom:6px;flex-shrink:0}
.modal-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text4);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;flex-shrink:0}
.pdf-search{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:9px 13px;color:var(--text);font-family:Arial,sans-serif;font-size:16px;outline:none;margin-bottom:12px;flex-shrink:0;transition:border-color .2s}
.pdf-search:focus{border-color:var(--gold)}
.pdf-list{overflow-y:auto;flex:1;border:1px solid var(--border);border-radius:7px;background:var(--bg2)}
.pdf-list::-webkit-scrollbar{width:3px}
.pdf-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.pdf-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;font-size:15px;line-height:1.3}
.pdf-item:last-child{border-bottom:none}
.pdf-item:hover{background:var(--bg3)}
.pdf-item.selected{background:#fff8f0;color:var(--gold);font-weight:600}
.pdf-item-name{font-weight:600;margin-bottom:2px}
.pdf-item-path{font-family:'DM Mono',monospace;font-size:10px;color:var(--text4)}
.pdf-loading-msg{padding:24px;text-align:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--text4);letter-spacing:2px}
#pdf-viewer{position:fixed;inset:0;background:#2a2420;z-index:400;display:none;flex-direction:column}
#pdf-viewer.show{display:flex}
.pdf-toolbar{display:flex;align-items:center;justify-content:space-between;padding:9px 20px;background:#1a1210;border-bottom:1px solid #3a2820;flex-shrink:0;gap:10px;flex-wrap:wrap}
.pdf-toolbar-group{display:flex;align-items:center;gap:7px}
.pdf-pages-label{font-family:'DM Mono',monospace;font-size:10px;color:#9a8070;letter-spacing:2px}
.pdf-zoom-val{font-family:'DM Mono',monospace;font-size:10px;color:#e0c090;min-width:38px;text-align:center}
.page-wrap{background:#fff;border-radius:4px;box-shadow:0 8px 36px rgba(0,0,0,0.7);overflow:hidden;flex-shrink:0;margin:0 7px}
.pdf-loading{font-family:'DM Mono',monospace;font-size:11px;color:#6a5848;letter-spacing:3px;text-transform:uppercase;margin:auto;padding-top:60px}
.pdf-spread{flex:1;overflow:auto;background:#1a110a;padding:24px 20px;position:relative;z-index:1;min-width:0}
.pdf-body{display:flex;flex-direction:row;flex:1;overflow:hidden;min-height:0}
.pdf-side{width:280px;min-width:280px;flex-shrink:0;background:#1a110a;border-left:1px solid #3a2820;overflow-y:auto;padding:14px;position:relative;z-index:200;pointer-events:all;isolation:isolate;display:block}
.pdf-side::-webkit-scrollbar{width:3px}
.pdf-side::-webkit-scrollbar-thumb{background:#3a2820;border-radius:2px}
.pdf-side-section{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #2a1c14}
.pdf-side-section:last-child{border-bottom:none}
.pdf-side-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#c0a080;margin-bottom:10px}
.pdf-timer-display{font-family:'DM Mono',monospace;font-size:44px;font-weight:300;color:#c09070;letter-spacing:2px;line-height:1;margin-bottom:8px}
.pdf-timer-info{font-family:'DM Mono',monospace;font-size:12px;color:#b09070;letter-spacing:1px;margin-top:6px}
.alarm-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.alarm-lbl{font-family:'DM Mono',monospace;font-size:12px;color:#b09070;letter-spacing:1px;min-width:48px}
.alarm-input{width:60px;background:#2a1810;border:1px solid #5a3820;border-radius:4px;color:#c09070;font-family:'DM Mono',monospace;font-size:13px;padding:4px 7px;outline:none;text-align:center}
.alarm-active{color:#6ade90!important;border-color:#3a8a58!important}
.pdf-metro-bpm{font-family:'DM Mono',monospace;font-size:38px;font-weight:300;color:#c09070;line-height:1}
.pdf-metro-unit{font-family:'DM Mono',monospace;font-size:10px;color:#5a4838}
.pdf-metro-beat2{width:10px;height:10px;border-radius:50%;background:#3a2820;display:inline-block;transition:background .05s,transform .05s;margin-left:6px;vertical-align:middle}
.pdf-metro-beat2.flash{background:#c9a030;transform:scale(1.5)}
.pdf-metro-slider{width:100%;accent-color:#8b5e2a;margin:6px 0;display:block}
.pdf-metro-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:6px}
.pdf-side-btn{background:#2a1810;border:1px solid #5a3820;color:#9a7858;font-size:11px;padding:4px 9px;border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace}
.pdf-side-btn:hover{background:#3a2218;color:#c09070}
.pdf-side-btn.active{background:#1a3a20;border-color:#3a8a58;color:#6ade90}
/* Card memo line */
.card-memo{font-size:11px;color:var(--text4);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;font-style:italic;line-height:1.3}
/* Card color tagging */
.card-colors{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.color-dot{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0}
.color-dot:hover{transform:scale(1.3)}
.color-dot.active{border-color:#fff;transform:scale(1.2)}
.color-dot.clear{background:none;border:2px dashed #aaa;opacity:0.6}
.pbtn.tagged-red{background:#fff0f0;border-color:#e05050}
.pbtn.tagged-orange{background:#fff5ec;border-color:#e08030}
.pbtn.tagged-yellow{background:#fffbe8;border-color:#c8a020}
.pbtn.tagged-green{background:#f0faf0;border-color:#40a060}
.pbtn.tagged-blue{background:#f0f4ff;border-color:#4060c0}
.pbtn.tagged-purple{background:#f8f0ff;border-color:#8040c0}
.pbtn.tagged-pink{background:#fff0f8;border-color:#c050a0}
.pbtn.tagged-red.act{border-color:#e05050}
.pbtn.tagged-orange.act{border-color:#e08030}
.pbtn.tagged-yellow.act{border-color:#c8a020}
.pbtn.tagged-green.act{border-color:#40a060}
.pbtn.tagged-blue.act{border-color:#4060c0}
.pbtn.tagged-purple.act{border-color:#8040c0}
.pbtn.tagged-pink.act{border-color:#c050a0}
/* Detail panel color row */
.detail-color-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.detail-color-btn{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s,border-color .1s}
.detail-color-btn:hover{transform:scale(1.2)}
.detail-color-btn.active{border-color:#333;transform:scale(1.15)}
.detail-color-btn.clear{background:none;border:2px dashed #aaa;width:22px;height:22px}
/* Star rating */
.stars{display:flex;gap:3px;margin-bottom:16px}
.star{font-size:22px;cursor:pointer;color:var(--border2);transition:color .15s;line-height:1;background:none;border:none;padding:0}
.star.on{color:#c9a030}
.star:hover{color:#c9a030}
/* Session log */
.session-log{margin-top:10px}
.session-entry{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px;line-height:1.4}
.session-entry:last-child{border-bottom:none}
.session-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);white-space:nowrap;margin-right:10px}
.session-dur{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);white-space:nowrap}
.session-note{flex:1;color:var(--text2);font-style:italic;font-size:15px;margin:0 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-empty{font-family:'DM Mono',monospace;font-size:10px;color:var(--text4);letter-spacing:2px;text-align:center;padding:14px 0}
/* Metronome */
.metro-block{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:18px}
.metro-bpm{font-family:'DM Mono',monospace;font-size:52px;font-weight:300;letter-spacing:2px;color:var(--text2);line-height:1;margin:6px 0}
.metro-bpm-unit{font-size:13px;color:var(--text4);letter-spacing:1px}
.metro-beat{width:14px;height:14px;border-radius:50%;background:var(--border2);display:inline-block;transition:background .05s,transform .05s;margin-left:6px;vertical-align:middle}
.metro-beat.flash{background:var(--accent);transform:scale(1.4)}
.metro-controls{display:flex;gap:7px;align-items:center;margin-top:10px;flex-wrap:wrap}
.metro-slider{flex:1;min-width:80px;accent-color:var(--accent)}
.metro-tap{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px}
/* Auto-link badge */
.auto-link-row{display:flex;gap:7px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.auto-match{background:#fff8e8;border:1px solid #c9a96e55;border-radius:6px;padding:6px 12px;font-size:13px;flex:1}
.auto-match-name{font-weight:600;color:var(--gold);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.auto-match-file{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4)}
/* Session note input */
.session-note-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:7px 11px;color:var(--text2);font-family:Arial,sans-serif;font-size:15px;outline:none;margin-top:6px;transition:border-color .2s}
.session-note-input:focus{border-color:var(--gold)}
</style>
</head>
<body>

<div id="pdf-viewer">
  <div class="pdf-toolbar">
    <div class="pdf-toolbar-group">

const CFG={
  clientId:'d069f3d2-23db-461b-9755-16420f84bce6',

};
const STATUSES=['Not Started','Learning','Polishing','Ready','E Flat','B Flat'];

// ── STATE ────────────────────────────────────────────────────────────────────
let token=null,userName=null,siteId=null;
let pieces=[],selId=null,currentTab='practice';
let timerInterval=null,timerRunning=false,elapsed=0;
let pdfDoc=null,pdfSpread=1,pdfZoom=1.0,pdfTotal=0,pdfSinglePage=false;
function pdfZoomKey(){
  // Use the PDF filename as the key so each PDF file has its own zoom level
  const p=pieces.find(x=>x.id===selId);
  const name=p&&p.pdfName?p.pdfName.replace(/[^a-zA-Z0-9]/g,'_'):'default';
  return'pdfZoom_'+name;
}
function loadSavedZoom(){
  try{
    const z=parseFloat(localStorage.getItem(pdfZoomKey()));
    if(z&&z>=0.3&&z<=3.0){pdfZoom=z;}
    else{pdfZoom=1.0;}
  }catch(e){pdfZoom=1.0;}
}
function saveZoom(){
  try{localStorage.setItem(pdfZoomKey(),pdfZoom);}catch(e){}
}
let allSiteFiles=[],selectedPdfFile=null;
let saveTimers={};
let _pdfPollTimer=null;

// ── UTILS ────────────────────────────────────────────────────────────────────
function recentlyPracticed(p){
  const log=p.sessionLog||[];
  if(!log.length)return false;
  const last=log[log.length-1];
  if(!last.date)return false;
  // Try to parse stored date + check within 36 hours
  try{
    const d=new Date(last.date);
    return(Date.now()-d.getTime())<36*60*60*1000;
  }catch{return false;}
}
function hms(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0)return`${h}h ${String(m).padStart(2,'0')}m`;if(m>0)return`${m}m ${String(sec).padStart(2,'0')}s`;return`${sec}s`;}
function clockFmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0)return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function syncMsg(msg,dur=3000){const el=document.getElementById('sync-msg');el.textContent=msg;el.style.opacity=1;if(dur)setTimeout(()=>{el.style.opacity=0},dur);}
function cleanFileName(name){return name.replace(/^\d+/,'').replace(/--+/g,' - ').replace(/-/g,' ').replace(/\.pdf$/i,'').trim();}

// ── AUTH ─────────────────────────────────────────────────────────────────────
function getRedirectUri(){
  // Strip query params and hash - works from localhost AND SharePoint hosting
  const base=window.location.href.split('?')[0].split('#')[0];
  // Remove SharePoint-appended suffixes like /music-practice.html?Web=1
  return base;
}
function parseTokenFromHash(){
  const hash=window.location.hash.substring(1);
  if(!hash)return null;
  const p=new URLSearchParams(hash);
  const t=p.get('access_token');
  if(!t)return null;
  history.replaceState(null,'',window.location.pathname);
  return t;
}
function getUserFromToken(t){
  try{const p=JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));return p.name||p.preferred_username||'Signed in';}
  catch{return'Signed in';}
}
function isTokenExpired(t){
  try{const p=JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));return p.exp&&(p.exp*1000)<Date.now();}
  catch{return true;}
}
function signIn(silent=false){
  const redirectUri=getRedirectUri();
  console.info('[Auth] Redirect URI being used:', redirectUri);
  const p=new URLSearchParams({
    client_id:CFG.clientId,response_type:'token',response_mode:'fragment',
    redirect_uri:redirectUri,scope:CFG.scopes+' openid profile',
    nonce:Math.random().toString(36).slice(2),
    ...(silent?{prompt:'none'}:{})
  });
  window.location.href=`https://login.microsoftonline.com/${CFG.tenantId}/oauth2/v2.0/authorize?${p}`;
}

function getTokenExpiry(){
  try{return parseInt(localStorage.getItem('mpt_token_exp')||'0');}catch(e){return 0;}
}
function saveTokenExpiry(){
  // Tokens last ~1 hour; save expiry 50 min from now to refresh proactively
  try{localStorage.setItem('mpt_token_exp',Date.now()+50*60*1000);}catch(e){}
}
function checkTokenExpiry(){
  if(!token)return;
  const exp=getTokenExpiry();
  if(exp&&Date.now()>exp){
    syncMsg('Session refreshing…',0);
    signIn(); // redirect to re-auth; page will reload with new token
  }
}
// Check every 5 minutes
setInterval(checkTokenExpiry,5*60*1000);
function signOut(){
  localStorage.removeItem('mpt_token');localStorage.removeItem('mpt_user');
  window.location.href=`https://login.microsoftonline.com/${CFG.tenantId}/oauth2/v2.0/logout?post_logout_redirect_uri=${encodeURIComponent(getRedirectUri())}`;
}

// ── GRAPH ────────────────────────────────────────────────────────────────────
async function gGet(url){
  const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok){const txt=await r.text();throw new Error(`${r.status}: ${txt.substring(0,200)}`);}
  return r.json();
}
async function gPost(url,body){
  const r=await fetch(url,{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const txt=await r.text();throw new Error(`${r.status}: ${txt.substring(0,200)}`);}
  return r.json();
}
async function gPatch(url,body){
  await fetch(url,{method:'PATCH',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
}
async function gDelete(url){
  await fetch(url,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
}

// ── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadFromSharePoint(){
  syncMsg('Connecting to SharePoint…',0);
  document.getElementById('piece-grid-wrap').innerHTML='<div class="full-center"><div class="loading-msg">Loading your pieces…</div></div>';
  try{
    const site=await gGet(`https://graph.microsoft.com/v1.0/sites/${CFG.siteHost}:${CFG.sitePath}`);
    siteId=site.id;
    const data=await gGet(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${CFG.listName}/items?expand=fields&$top=500`);
    pieces=(data.value||[]).map(item=>({
      id:item.id,
      title:item.fields.Title||'',
      composer:item.fields.Composer||'',
      status:item.fields.Status||'Not Started',
      notes:item.fields.Notes||'',
      totalSeconds:item.fields.TotalSeconds||0,
      sessions:item.fields.Sessions||0,
      pdfName:item.fields.PdfName||null,
      pdfUrl:item.fields.PdfUrl||null,
      pdfFileId:item.fields.PdfFileId||null,
      cardColor:null, // loaded from localStorage below
      ...(()=>{
        const raw=item.fields.Notes||'';
        const idx=raw.indexOf('\n\n__META__');
        if(idx===-1)return{stars:0,sessionLog:[],notes:raw};
        try{const m=JSON.parse(raw.slice(idx+10));return{stars:m.s||0,sessionLog:m.l||[],notes:raw.slice(0,idx)};}
        catch{return{stars:0,sessionLog:[],notes:raw.slice(0,idx)};}
      })(),
    }));
    syncMsg('Synced with SharePoint ✓');
    loadCardColors();renderPieceGrid();updateStats();
    // Load PDF files in background
    loadSiteFiles();
  }catch(e){
    console.error('SharePoint error:',e);
    if(e.message.includes('401')||e.message.includes('InvalidAuthentication')){
      localStorage.removeItem('mpt_token');localStorage.removeItem('mpt_user');
      token=null;updateAuthUI(false);
      document.getElementById('right-panel').innerHTML='<div class="full-center"><div class="signin-clef">𝄞</div><h2>Session expired</h2><p>Please sign in again</p><button class="btn-signin" onclick="signIn()">Sign in with Microsoft</button></div>';
      document.getElementById('piece-grid-wrap').innerHTML='';
      syncMsg('Session expired',0);
    } else {
      syncMsg('Error: '+e.message.substring(0,60),0);
    }
  }
}

async function loadSiteFiles(){
  try{
    let all=[];
    // Try Site Assets folder directly first (where your scores are stored)
    const attempts=[
      // Site Assets library items
      ()=>gGet(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Site Assets/items?expand=fields($select=FileLeafRef,FileRef)&$top=500`),
      // Search entire site drive
      ()=>gGet(`https://graph.microsoft.com/v1.0/sites/${siteId}/drive/root/search(q='.pdf')?$top=500`),
    ];

    // Site Assets list — proven to work with 139 PDFs
    try{
      let url=`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/Site%20Assets/items?expand=fields&$top=500`;
      while(url){
        const data=await gGet(url);
        const items=(data.value||[])
          .filter(i=>i.fields&&i.fields.FileLeafRef&&i.fields.FileLeafRef.toLowerCase().endsWith('.pdf'))
          .map(i=>({
            id:i.id,           // list item ID (short number) - use for driveItem expand
            listItemId:i.id,   // explicit alias
            name:i.fields.FileLeafRef,
            displayName:cleanFileName(i.fields.FileLeafRef),
            webUrl:`https://${CFG.siteHost}${i.fields.FileRef||''}`,
            downloadUrl:`https://${CFG.siteHost}${i.fields.FileRef||''}`,
            fileRef:i.fields.FileRef||'',
          }));
        all=[...all,...items];
        url=data['@odata.nextLink']||null;
      }
      console.log(`Site Assets: found ${all.length} PDFs`);
      if(all.length>0){
        allSiteFiles=all.sort((a,b)=>a.displayName.localeCompare(b.displayName));
        console.log('PDF files loaded successfully!');
        if(document.getElementById('pdf-modal').classList.contains('show'))filterPdfList();
        return; // Success — skip drive search fallback
      }
    }catch(e1){
      console.warn('Site Assets list failed:',e1.message);
    }

    // If Site Assets didn't work, search the whole drive
    if(all.length===0){
      try{
        let url=`https://graph.microsoft.com/v1.0/sites/${siteId}/drive/root/search(q='.pdf')?$top=500`;
        while(url){
          const data=await gGet(url);
          const items=(data.value||[]).filter(i=>i.name&&i.name.toLowerCase().endsWith('.pdf'));
          all=[...all,...items.map(i=>({
            id:i.id,
            name:i.name,
            displayName:cleanFileName(i.name),
            webUrl:i.webUrl||'',
            downloadUrl:i['@microsoft.graph.downloadUrl']||i.webUrl||'',
          }))];
          url=data['@odata.nextLink']||null;
        }
        console.log(`Drive search: found ${all.length} PDFs`);
      }catch(e2){console.warn('Drive search failed:',e2.message);}
    }

    allSiteFiles=all.sort((a,b)=>a.displayName.localeCompare(b.displayName));
    console.log(`Total PDF files loaded: ${allSiteFiles.length}`);
    if(document.getElementById('pdf-modal').classList.contains('show'))filterPdfList();
  }catch(e){
    console.error('Failed to load PDF files:',e.message);
  }
}

// ── SHAREPOINT CRUD ──────────────────────────────────────────────────────────
function spFields(p){
  // Pack stars+sessionLog as a JSON trailer after a separator in Notes
  const meta=JSON.stringify({s:p.stars||0,l:(p.sessionLog||[]).slice(-50)});
  const notesWithMeta=(p.notes||'')+'\n\n__META__'+meta;
  return{Title:p.title,Composer:p.composer||'',Status:p.status,Notes:notesWithMeta,TotalSeconds:p.totalSeconds||0,Sessions:p.sessions||0,PdfName:p.pdfName||'',PdfUrl:p.pdfUrl||''};
}
async function spCreate(p){
  const r=await gPost(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${CFG.listName}/items`,{fields:spFields(p)});
  console.log('[spCreate] response:',JSON.stringify(r).slice(0,300));
  // SharePoint returns id as a string like "42"
  return r.id||r.fields?.id||r.fields?.ID;
}
async function spUpdate(p){await gPatch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${CFG.listName}/items/${p.id}/fields`,spFields(p));}
async function spDelete(id){await gDelete(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${CFG.listName}/items/${id}`);}

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  ['practice','interleave','eflat','bflat'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===tab));
  renderPieceGrid();
}

function isInterleave(p){return p.status==='Interleave'||p.title.toLowerCase().includes('interleave');}
// Note: isPractice excludes interleave, eflat, bflat
function isEflat(p){return p.status==='E Flat';}
function isBflat(p){return p.status==='B Flat';}
function isPractice(p){return !isInterleave(p)&&!isEflat(p)&&!isBflat(p);}

function sortKey(p){
  return p.title
    .replace(/^(LJS|VIT|BWV|Op|No)\s*[-–\.]\s*/gi,'')  // strip known prefixes
    .replace(/^[A-Z]{2,5}\s*[-–]\s*/,'')                // strip any ALL-CAPS prefix
    .replace(/^(The|A|An)\s+/i,'')                      // strip articles
    .toLowerCase().trim();
}
function sortedPieces(list){
  return [...list].sort((a,b)=>sortKey(a).localeCompare(sortKey(b)));
}

// ── RENDER GRID ──────────────────────────────────────────────────────────────
function renderPieceGrid(){
  const query=(document.getElementById('search-box')?.value||'').toLowerCase().trim();
  const wrap=document.getElementById('piece-grid-wrap');
  const practice=pieces.filter(p=>isPractice(p));
  const interleave=pieces.filter(p=>isInterleave(p));
  const eflat=pieces.filter(p=>isEflat(p));
  const bflat=pieces.filter(p=>isBflat(p));
  document.getElementById('tc-practice').textContent=practice.length;
  document.getElementById('tc-interleave').textContent=interleave.length;
  document.getElementById('tc-eflat').textContent=eflat.length;
  document.getElementById('tc-bflat').textContent=bflat.length;
  const listMap={practice,interleave,eflat,bflat};
  const list=listMap[currentTab]||practice;
  const filtered=sortedPieces(list).filter(p=>!query||p.title.toLowerCase().includes(query)||(p.composer||'').toLowerCase().includes(query));
  if(!filtered.length){wrap.innerHTML='<div style="text-align:center;padding:32px;color:var(--text4);font-style:italic;font-size:16px">No pieces found</div>';return;}
  if(currentTab!=='practice'){wrap.innerHTML=`<div class="piece-grid">${filtered.map(pieceCard).join('')}</div>`;return;}
  const groups={};
  filtered.forEach(p=>{if(!groups[p.status])groups[p.status]=[];groups[p.status].push(p);});
  let html='';
  STATUSES.forEach(s=>{
    if(!groups[s])return;
    const sm=SM[s];
    html+=`<div class="group-header"><span class="group-dot" style="background:${sm.c}"></span>${s} <span style="opacity:.6">(${groups[s].length})</span><span class="group-line"></span></div>`;
    html+=`<div class="piece-grid">${groups[s].map(pieceCard).join('')}</div>`;
  });
  wrap.innerHTML=html;
}

function pieceCard(p){
  const sm=SM[p.status]||SM['Not Started'];
  const hasPdf=!!(p.pdfUrl||p.pdfName);
  const wasPracticed=recentlyPracticed(p);
  const colorClass=p.cardColor?` tagged-${p.cardColor}`:'';
  return`<button class="pbtn${selId===p.id?' act':''}${wasPracticed?' practiced':''}${colorClass}" onclick="selectPiece('${p.id}')">
    <div class="pbtn-title">${esc(p.title)}</div>
    ${p.composer?`<div class="pbtn-composer">${esc(p.composer)}</div>`:''}
    ${(()=>{const n=(p.notes||'').replace(/\n\n__META__.*/,'').trim();return n?`<div class="card-memo" title="${esc(n)}">${esc(n.length>55?n.slice(0,55)+'…':n)}</div>`:''})()}
    <div class="pbtn-meta">
      <span class="spill" style="color:${sm.c};border-color:${sm.bc};background:${sm.g}">${sm.s} ${p.status}</span>
      ${hasPdf?'<span class="pdf-badge">PDF</span>':''}
      ${p.totalSeconds>0?`<span class="time-badge">${hms(p.totalSeconds)}</span>`:''}
      ${p.stars>0?`<span style="font-size:10px;color:#c9a030;letter-spacing:-1px">${'★'.repeat(p.stars)}${'☆'.repeat(5-p.stars)}</span>`:''}
      <div class="card-colors" onclick="event.stopPropagation()">
        ${[['red','#e05050'],['orange','#e08030'],['yellow','#c8a020'],['green','#40a060'],['blue','#4060c0'],['purple','#8040c0'],['pink','#c050a0']].map(([name,hex])=>`<span class="color-dot${p.cardColor===name?' active':''}" style="background:${hex}" onclick="setCardColor('${p.id}','${name}')" title="${name}"></span>`).join('')}

      </div>

}

function updateStats(){
  document.getElementById('stat-pieces').textContent=pieces.length;

function renderTimerControls(){

    el.innerHTML=`<button class="btn btn-blue" onclick="pauseTimer()">⏸ Pause</button><button class="btn btn-ghost" onclick="resetTimer()" style="font-size:12px;padding:5px 10px">↺ Reset</button>`;

    el.innerHTML=`<button class="btn btn-primary" onclick="startTimer()">▶ Resume</button><button class="btn btn-green" onclick="saveTimer()">✓ Save — ${hms(elapsed)}</button><button class="btn btn-ghost" onclick="resetTimer()">↺ Reset</button>`;

function updField(field,value){
  const p=pieces.find(x=>x.id===selId);if(!p)return;
  p[field]=value;
  clearTimeout(saveTimers[selId]);
  saveTimers[selId]=setTimeout(()=>{if(token&&siteId)spUpdate(p).catch(console.error);},1200);
  if(field==='title'||field==='composer')renderPieceGrid();
}

function updStatus(status){
  const p=pieces.find(x=>x.id===selId);if(!p)return;
  p.status=status;
  if(token&&siteId)spUpdate(p).catch(console.error);
  renderPieceGrid();renderDetail();
}

async function addPiece(){
  const title=document.getElementById('new-title').value.trim();
  if(!title){document.getElementById('new-title').focus();return;}
  const p={id:'tmp-'+Date.now(),title,composer:document.getElementById('new-composer').value.trim(),notes:document.getElementById('new-notes').value.trim(),status:document.getElementById('new-status')?.value||'Not Started',totalSeconds:0,sessions:0,pdfName:null,pdfUrl:null,pdfFileId:null,stars:0,sessionLog:[]};
  pieces.push(p);closeAddModal();selId=p.id;renderPieceGrid();renderDetail();updateStats();
  if(token&&siteId){
    try{
      syncMsg('Saving…',0);
      const newId=await spCreate(p);
      if(!newId)throw new Error('No ID returned from SharePoint');
      p.id=newId;selId=newId;renderPieceGrid();
      syncMsg('✓ Saved to SharePoint');
      console.log('[addPiece] saved with id:',newId);
    }catch(e){
      console.error('[addPiece] FAILED:',e);
      // Show persistent red error in header
      const el=document.getElementById('sync-msg');
      if(el){el.textContent='SAVE FAILED: '+e.message.slice(0,60);el.style.opacity=1;el.style.color='#ef9070';}
      alert('Could not save to SharePoint:\n'+e.message+'\n\nThe piece is shown locally but will disappear on refresh.');
    }
  } else {
    syncMsg('Not signed in — not saved',5000);
    alert('You are not signed in. Please sign in to save pieces to SharePoint.');
  }
}

async function delPiece(){
  const p=pieces.find(x=>x.id===selId);if(!p)return;
  if(!confirm(`Remove "${p.title}"?`))return;
  discardTimer();const id=p.id;
  pieces=pieces.filter(x=>x.id!==id);selId=null;
  renderPieceGrid();
  document.getElementById('right-panel').innerHTML='<div class="full-center"><div class="empty-clef">𝄞</div><div class="empty-msg">Select a piece to begin</div></div>';
  updateStats();
  if(token&&siteId)spDelete(id).catch(console.error);
}

function openAddModal(){
  document.getElementById('add-modal').classList.add('show');
  document.getElementById('new-title').value='';
  document.getElementById('new-composer').value='';
  document.getElementById('new-notes').value='';

  if(sel)sel.value=currentTab==='interleave'?'Interleave':currentTab==='eflat'?'E Flat':currentTab==='bflat'?'B Flat':'Not Started';

// ── TIMER ────────────────────────────────────────────────────────────────────
function startTimer(){
  if(timerRunning)return;
  timerRunning=true;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    elapsed++;
    const d=document.getElementById('timer-display');
    if(d){d.textContent=clockFmt(elapsed);d.style.color='#8b5e2a';}
    const pd=document.getElementById('pdf-timer-display');
    if(pd)pd.textContent=clockFmt(elapsed);
    checkAlarms();
    syncPdfSide();
  },1000);
  renderTimerControls();
  syncPdfSide();
}
function pauseTimer(){timerRunning=false;clearInterval(timerInterval);const d=document.getElementById('timer-display');if(d)d.style.color='#1a5f8a';renderTimerControls();}
function saveTimer(){
  const p=pieces.find(x=>x.id===selId);if(!p)return;
  const dur=elapsed;
  p.totalSeconds=(p.totalSeconds||0)+dur;
  p.sessions=(p.sessions||0)+1;
  // Save session log entry
  const noteEl=document.getElementById('session-note-input')||document.getElementById('pdf-session-note');
  const noteVal=noteEl?noteEl.value.trim():'';
  const now=new Date();
  const entry={date:now.toISOString(),dateDisplay:now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),dur:hms(dur),note:noteVal};
  if(!p.sessionLog)p.sessionLog=[];
  p.sessionLog.push(entry);
  timerRunning=false;clearInterval(timerInterval);elapsed=0;
  if(token&&siteId)spUpdate(p).catch(console.error);
  updateStats();renderDetail();
}
function discardTimer(){timerRunning=false;clearInterval(timerInterval);timerInterval=null;elapsed=0;renderDetail();syncPdfSide();}
function resetTimer(){
  if(timerRunning){clearInterval(timerInterval);timerInterval=null;timerRunning=false;}
  elapsed=0;
  const d=document.getElementById('timer-display');if(d)d.textContent=clockFmt(0);
  const pd=document.getElementById('pdf-timer-display');if(pd)pd.textContent=clockFmt(0);
  renderTimerControls();syncPdfSide();
}

// ── PDF PICKER ───────────────────────────────────────────────────────────────
function openPdfModal(){
  selectedPdfFile=null;
  document.getElementById('pdf-attach-btn').disabled=true;
  const p=pieces.find(x=>x.id===selId);
  // Strip common prefixes/suffixes then take just the first meaningful word or two
  const autoQuery=p?(()=>{
    const cleaned=p.title
      .replace(/^LJS\s*[-–]\s*/i,'')         // "LJS - " prefix
      .replace(/^[A-Z]{2,4}\s*[-–]\s*/,'')   // other short prefixes like "BWV - "
      .replace(/\s*\(.*?\)\s*/g,' ')          // parentheticals
      .replace(/\s*[-–]\s*Two\s*Page.*/i,'')  // "- Two Page" suffix
      .replace(/\s*[-–]\s*Score.*/i,'')       // "- Score" suffix
      .trim();
    // Take first word only (most reliable for search matching)
    const words=cleaned.split(/\s+/).filter(Boolean);
    return words.slice(0,1).join(' ');
  })():'';
  document.getElementById('pdf-search').value=autoQuery;
  document.getElementById('pdf-modal').classList.add('show');
  filterPdfList();
}

function renderPdfList(query){
  const el=document.getElementById('pdf-list');if(!el)return;
  if(!allSiteFiles.length){
    el.innerHTML='<div class="pdf-loading-msg">LOADING FILES FROM SHAREPOINT…</div>';
    clearTimeout(_pdfPollTimer);
    _pdfPollTimer=setTimeout(()=>renderPdfList(query),600);
    return;
  }
  clearTimeout(_pdfPollTimer);
  const filtered=allSiteFiles.filter(f=>{
    if(!query)return true;
    const haystack=(f.displayName+' '+f.name).toLowerCase();
    // Match if any word in the query is a prefix of any word in the filename
    const qwords=query.split(/\s+/).filter(Boolean);
    return qwords.every(qw=>haystack.includes(qw)||
      haystack.split(/[\s\-_\.]+/).some(hw=>hw.startsWith(qw)));
  });
  if(!filtered.length){el.innerHTML=`<div class="pdf-loading-msg">NO FILES FOUND<br><br><small style="font-size:10px;opacity:.6">Try a shorter search term</small></div>`;return;}
  el.innerHTML=filtered.map(f=>`
    <div class="pdf-item${selectedPdfFile&&selectedPdfFile.id===f.id?' selected':''}" style="display:flex;align-items:center;gap:8px;padding-right:6px" onclick="selectPdfFile('${f.id}')">
      <div style="flex:1;min-width:0">
        <div class="pdf-item-name">${esc(f.displayName)}</div>
        <div class="pdf-item-path">${esc(f.name)}</div>
      </div>
      <button onclick="event.stopPropagation();deletePdfFile('${f.id}','${esc(f.name)}')"
        title="Delete from SharePoint"
        style="flex-shrink:0;background:none;border:1px solid #e0a0a0;color:#c05050;border-radius:4px;padding:2px 7px;cursor:pointer;font-size:11px;opacity:0.7"
        onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">🗑</button>
    </div>`).join('');
}

async function deletePdfFile(fileId, fileName){
  if(!confirm(`Delete "${fileName}" from SharePoint?

This cannot be undone.`))return;
  try{
    // Try to delete via drive item ID directly
    const drives=await gGet(`https://graph.microsoft.com/v1.0/sites/${siteId}/drives`);
    let deleted=false;
    // Try deleting via each drive
    for(const drive of (drives.value||[])){
      try{
        // Search for the file in this drive
        const results=await gGet(`https://graph.microsoft.com/v1.0/drives/${drive.id}/root/search(q='${encodeURIComponent(fileName)}')?$select=id,name&$top=10`);
        const match=(results.value||[]).find(i=>i.name===fileName);
        if(match){
          await fetch(`https://graph.microsoft.com/v1.0/drives/${drive.id}/items/${match.id}`,
            {method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
          deleted=true;
          break;
        }
      }catch(e){console.warn('Delete attempt failed:',e.message);}
    }
    if(!deleted){
      // Try direct drive item delete
      await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/drive/items/${fileId}`,
        {method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
      deleted=true;
    }
    // Remove from local list
    allSiteFiles=allSiteFiles.filter(f=>f.id!==fileId&&f.name!==fileName);
    filterPdfList();
    syncMsg('File deleted ✓');
  }catch(e){
    alert('Could not delete: '+e.message);
  }
}

async function openPdf(){
  const p=pieces.find(x=>x.id===selId);if(!p||!p.pdfUrl)return;

  loadSavedZoom();
  document.getElementById('pdf-viewer').classList.add('show');
  document.getElementById('pdf-spread').innerHTML='<div class="pdf-loading">LOADING SCORE…</div>';
  syncPdfSide(); // populate timer controls immediately
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  try{
    let buf=null;

    // STRATEGY: Get driveItem ID then fetch downloadUrl, use XHR to download

    // Step 1: Get driveItem ID from list item expand
    let driveItemId=null, freshDlUrl=null;
    if(p.pdfFileId&&/^\d+$/.test(String(p.pdfFileId))){
      for(const listName of['Site%20Assets','SiteAssets','Shared%20Documents']){
        try{
          const item=await gGet(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${listName}/items/${p.pdfFileId}?expand=driveItem($select=id,name)`);
          if(item&&item.driveItem&&item.driveItem.id){
            driveItemId=item.driveItem.id;
            break;
          }
        }catch(e){}
      }
    }

    // Step 2: Get downloadUrl using driveItem ID across all drives
    if(driveItemId){
      try{
        const drives=await gGet(`https://graph.microsoft.com/v1.0/sites/${siteId}/drives`);
        for(const drive of(drives.value||[])){
          try{
            const meta=await gGet(`https://graph.microsoft.com/v1.0/drives/${drive.id}/items/${driveItemId}?select=id,@microsoft.graph.downloadUrl`);
            if(meta&&meta['@microsoft.graph.downloadUrl']){
              freshDlUrl=meta['@microsoft.graph.downloadUrl'];
              break;
            }
          }catch(e){}
        }
      }catch(e){}
    }

    // Step 3: Search by filename as fallback
    if(!freshDlUrl&&p.pdfName){
      try{
        const drives=await gGet(`https://graph.microsoft.com/v1.0/sites/${siteId}/drives`);
        for(const drive of(drives.value||[])){
          try{
            const res=await gGet(`https://graph.microsoft.com/v1.0/drives/${drive.id}/root/search(q='${encodeURIComponent(p.pdfName)}')?$select=id,name,@microsoft.graph.downloadUrl&$top=10`);
            const match=(res.value||[]).find(i=>i.name===p.pdfName);
            if(match&&match['@microsoft.graph.downloadUrl']){freshDlUrl=match['@microsoft.graph.downloadUrl'];break;}
          }catch(e){}
        }
      }catch(e){}
    }

    // Step 3: Fetch the PDF using XHR (better cross-origin redirect handling than fetch)
    if(!buf&&freshDlUrl){
      buf=await new Promise(resolve=>{
        const xhr=new XMLHttpRequest();
        xhr.open('GET',freshDlUrl,true);
        xhr.responseType='arraybuffer';
        xhr.onload=()=>{
          console.log('[PDF] XHR status:',xhr.status,'type:',xhr.getResponseHeader('content-type'));
          resolve(xhr.status===200?xhr.response:null);
        };
        xhr.onerror=(e)=>{console.warn('[PDF] XHR error:',e);resolve(null);};
        xhr.send();
      });
      console.log('[PDF] XHR buf:',!!buf);
    }

    // Step 4: Try fetch as final fallback
    if(!buf&&freshDlUrl){
      try{const r=await fetch(freshDlUrl);if(r.ok)buf=await r.arrayBuffer();}catch(e){}
    }

    if(!buf)throw new Error('All methods failed');
    pdfDoc=await pdfjsLib.getDocument({data:buf}).promise;
    pdfTotal=pdfDoc.numPages;pdfSpread=1;loadSavedZoom();
    // Check if pages are already wide (landscape = already two-page spread)
    const firstPage=await pdfDoc.getPage(1);
    const vp0=firstPage.getViewport({scale:1});
    pdfSinglePage=(vp0.width>vp0.height*1.2); // landscape = show one page at a time
    await renderSpread();
  }catch(e){
    document.getElementById('pdf-spread').innerHTML=`<div class="pdf-loading" style="color:#ef9070;text-align:center;line-height:2.2">${e.message}<br><br><a href="${p.pdfUrl}" target="_blank" style="color:#90c0e0;font-size:14px;text-decoration:underline">Open in SharePoint ↗</a><br><br><button onclick="diagnosePdf()" style="margin-top:8px;background:#3a2820;border:1px solid #c09070;color:#e0c090;padding:8px 18px;border-radius:5px;cursor:pointer;font-size:13px">🔍 Run Diagnostics</button><div id="diag-out" style="margin-top:14px;text-align:left;font-size:11px;color:#a09080;max-width:600px;word-break:break-all;line-height:1.8"></div></div>`;
  }
}

  row.style.cssText='display:flex;flex-wrap:nowrap;align-items:flex-start;gap:14px;margin:0 auto;width:fit-content';
  container.appendChild(row);
  async function renderOne(n){
    const wrap=document.createElement('div');
    wrap.className='page-wrap';
    wrap.style.position='relative';
    const canvas=document.createElement('canvas');
    const page=await pdfDoc.getPage(n);
    const vp=page.getViewport({scale:pdfZoom*1.6});

    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    // Annotation overlay canvas
    const overlay=document.createElement('canvas');
    overlay.width=vp.width;overlay.height=vp.height;
    overlay.style.cssText=`position:absolute;top:0;left:0;cursor:crosshair;touch-action:none;pointer-events:none`;
    overlay.dataset.page=n;
    // Only enable pointer events on the overlay when mouse is over the score page
    wrap.addEventListener('mouseenter',()=>{overlay.style.pointerEvents='auto';});
    wrap.addEventListener('mouseleave',()=>{overlay.style.pointerEvents='none';});
    setupDrawing(overlay);
    // Restore saved annotations
    restoreAnnotations(overlay,n);
    wrap.appendChild(canvas);
    wrap.appendChild(overlay);
    row.appendChild(wrap);
  }
  await renderOne(pdfSpread);
  if(!pdfSinglePage&&pdfSpread+1<=pdfTotal)await renderOne(pdfSpread+1);
  syncPdfSide();
}

// ── AUTO-LINK ────────────────────────────────────────────────────────────────
function normalizeForMatch(s){
  return s.toLowerCase()
    .replace(/^ljs\s*[-–]\s*/i,'')
    .replace(/^[a-z]{2,5}\s*[-–]\s*/i,'')
    .replace(/\s*[-–]\s*two\s*page.*/i,'')
    .replace(/\s*[-–]\s*(two\s*pg|score|b\s*flat|e\s*flat|bb|eb).*/i,'')
    .replace(/\.pdf$/i,'')
    .replace(/op\.?\s*(\d)/gi,'opus $1')
    .replace(/no\.?\s*(\d)/gi,'no $1')
    .replace(/[-_]+/g,' ')           // hyphens/underscores → spaces
    .replace(/[^a-z0-9 ]/gi,' ')
    .replace(/\s+/g,' ').trim();
}

// Check if word A is a prefix of word B or vice versa (handles abbreviations)
function wordsMatch(a, b){
  if(a===b)return true;
  if(a.length>=3&&b.startsWith(a))return true; // "beethov" matches "beethoven"
  if(b.length>=3&&a.startsWith(b))return true; // "beethoven" matches "beethov"
  return false;
}

function findAutoMatch(p){
  if(!allSiteFiles.length)return null;
  const title=normalizeForMatch(p.title);
  const titleWords=title.split(' ').filter(w=>w.length>2);
  if(!titleWords.length)return null;

  let best=null,bestScore=0;
  for(const f of allSiteFiles){
    const fname=normalizeForMatch(f.name);
    const fnameWords=fname.split(' ').filter(w=>w.length>2);
    let score=0;
    for(const tw of titleWords){
      // Check if any filename word matches (prefix/abbreviation aware)
      if(fnameWords.some(fw=>wordsMatch(tw,fw)))score++;
    }
    const ratio=score/titleWords.length;
    if(ratio>bestScore){bestScore=ratio;best=f;}
  }
  return bestScore>=0.5?best:null;
}

  p.pdfFileId=match.listItemId||match.id||null;

// Auto-link all pieces that have no PDF and have a strong match
async function autoLinkAll(){
  let linked=0,fixed=0;
  for(const p of pieces){
    // Skip if already has a valid pdfFileId
    if(p.pdfName&&p.pdfFileId)continue;

    // If has pdfName but no pdfFileId, try to fix the ID by finding the file
    if(p.pdfName&&!p.pdfFileId){
      const byName=allSiteFiles.find(f=>f.name===p.pdfName);
      if(byName){
        p.pdfFileId=byName.listItemId||byName.id||null;
        p.pdfUrl=byName.webUrl||p.pdfUrl;
        if(token&&siteId)await spUpdate(p).catch(console.error);
        fixed++;
        continue;
      }
    }

    // No score at all - find a match
    if(!p.pdfName){
      const match=findAutoMatch(p);
      if(!match)continue;
      p.pdfName=match.name;
      p.pdfUrl=match.webUrl||match.downloadUrl||'';
      p.pdfFileId=match.listItemId||match.id||null;
      if(token&&siteId)await spUpdate(p).catch(console.error);
      linked++;
    }
  }
  renderPieceGrid();
  if(selId)renderDetail();
  const msg=[];
  if(linked)msg.push(`linked ${linked} new`);
  if(fixed)msg.push(`fixed ${fixed} IDs`);
  syncMsg(msg.length?`Auto-link: ${msg.join(', ')} ✓`:'All scores already linked ✓');
}

let metroBpm_val=80,metroBeats=4,metroInterval=null,metroBeat=0;

// ── ALARM STATE ───────────────────────────────────────────────────────────────
let alarmTargetSecs=0,alarmTargetActive=false;
let alarmIntervalSecs=0,alarmIntervalActive=false,alarmIntervalTimer=null;
let alarmAudioCtx=null;

function parseMMSS(str){
  if(!str)return 0;
  const parts=str.trim().split(':');
  if(parts.length===2)return parseInt(parts[0])*60+parseInt(parts[1]);
  return parseInt(parts[0])||0;
}

function alarmRing(type){
  // Play a bell sound using Web Audio
  try{
    if(!alarmAudioCtx)alarmAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const ctx=alarmAudioCtx;
    const count=type==='target'?3:1;
    for(let i=0;i<count;i++){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';
      o.frequency.setValueAtTime(880,ctx.currentTime+i*0.4);
      o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+i*0.4+0.3);
      g.gain.setValueAtTime(0.6,ctx.currentTime+i*0.4);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.4+0.5);
      o.start(ctx.currentTime+i*0.4);
      o.stop(ctx.currentTime+i*0.4+0.5);
    }
  }catch(e){}
}

    const secs=parseMMSS(inp?inp.value:'5:00');

}

    if(alarmIntervalTimer){clearInterval(alarmIntervalTimer);alarmIntervalTimer=null;}
    if(btn){btn.textContent='SET';btn.style.color='#9a7858';btn.style.borderColor='#5a3820';}
    if(inp){inp.style.borderColor='#5a3820';inp.style.color='#c09070';}
  } else {
    const secs=parseMMSS(inp?inp.value:'0:45');
    if(!secs)return;
    alarmIntervalSecs=secs;alarmIntervalActive=true;
    if(alarmIntervalTimer)clearInterval(alarmIntervalTimer);
    alarmIntervalTimer=setInterval(()=>{if(timerRunning)alarmRing('interval');},secs*1000);
    if(btn){btn.textContent='ON ✓';btn.style.color='#6ade90';btn.style.borderColor='#3a8a58';}
    if(inp){inp.style.borderColor='#3a8a58';inp.style.color='#6ade90';}
  }
}

// Call this every second from timer tick to check target alarm
function checkAlarms(){
  if(alarmTargetActive&&alarmTargetSecs>0&&elapsed===alarmTargetSecs){
    alarmRing('target');
  }
}

// Sync the PDF side panel timer display
function syncPdfSide(){
  const p=pieces.find(x=>x.id===selId);
  // Timer display
  const td=document.getElementById('pdf-timer-display');
  if(td)td.textContent=clockFmt(elapsed);
  const tc2=document.getElementById('pdf-timer-controls');
  if(tc2){
    if(!timerRunning&&elapsed===0){
      tc2.innerHTML=`<button class="pdf-side-btn" onclick="startTimer()">▶ Start</button>`;
    } else if(timerRunning){
      tc2.innerHTML=`<button class="pdf-side-btn" onclick="pauseTimer()">⏸ Pause</button> <button class="pdf-side-btn" onclick="resetTimer()">↺ Reset</button>`;
    } else {
      tc2.innerHTML=`<button class="pdf-side-btn" onclick="startTimer()">▶ Resume</button> <button class="pdf-side-btn active" onclick="saveTimer()">✓ Save ${hms(elapsed)}</button> <button class="pdf-side-btn" onclick="resetTimer()">↺ Reset</button>`;
    }
  }
  const ti=document.getElementById('pdf-timer-info');
  if(ti&&p)ti.textContent=`Total: ${hms(p.totalSeconds||0)} · Sessions: ${p.sessions||0}`;
  const ni=document.getElementById('pdf-session-note');
  if(ni)ni.style.display=elapsed>0?'block':'none';
  // Alarms section - render dynamically so buttons always work
  const alarmSec=document.getElementById('pdf-alarm-section');
  if(alarmSec){
    const tActive=alarmTargetActive;
    const iActive=alarmIntervalActive;
    const tVal=alarmTargetSecs?(Math.floor(alarmTargetSecs/60)+':'+(alarmTargetSecs%60).toString().padStart(2,'0')):'5:00';
    const iVal=alarmIntervalSecs?(Math.floor(alarmIntervalSecs/60)+':'+(alarmIntervalSecs%60).toString().padStart(2,'0')):'0:45';
    alarmSec.innerHTML=`
      <div class="pdf-side-label">Alarms</div>
      <div class="alarm-row">
        <span class="alarm-lbl">TARGET</span>
        <input class="alarm-input" id="alarm-target" type="text" value="${tActive?tVal:'5:00'}" placeholder="5:00"
          style="border-color:${tActive?'#3a8a58':'#5a3820'};color:${tActive?'#6ade90':'#c09070'}"/>
        <button id="alarm-target-btn" style="background:#2a1810;border:1px solid ${tActive?'#3a8a58':'#5a3820'};color:${tActive?'#6ade90':'#9a7858'};font-size:11px;padding:4px 10px;cursor:pointer;border-radius:4px;font-family:'DM Mono',monospace">${tActive?'ON ✓':'SET'}</button>
      </div>
      <div class="alarm-row">
        <span class="alarm-lbl">EVERY</span>
        <input class="alarm-input" id="alarm-interval" type="text" value="${iActive?iVal:'0:45'}" placeholder="0:45"
          style="border-color:${iActive?'#3a8a58':'#5a3820'};color:${iActive?'#6ade90':'#c09070'}"/>
        <button id="alarm-interval-btn" style="background:#2a1810;border:1px solid ${iActive?'#3a8a58':'#5a3820'};color:${iActive?'#6ade90':'#9a7858'};font-size:11px;padding:4px 10px;cursor:pointer;border-radius:4px;font-family:'DM Mono',monospace">${iActive?'ON ✓':'SET'}</button>
      </div>`;
    // Attach listeners directly to freshly created buttons
    document.getElementById('alarm-target-btn').addEventListener('click',function(e){e.stopPropagation();toggleTargetAlarm();syncPdfSide();});
    document.getElementById('alarm-interval-btn').addEventListener('click',function(e){e.stopPropagation();toggleIntervalAlarm();syncPdfSide();});
  }
  // Metronome BPM
  const mb=document.getElementById('pdf-metro-bpm');
  const ms=document.getElementById('pdf-metro-slider');
  if(mb)mb.textContent=metroBpm_val;
  if(ms)ms.value=metroBpm_val;
  // Metro start btn
  const pmb=document.getElementById('pdf-metro-btn');
  if(pmb){pmb.textContent=metroInterval?'■ Stop':'▶ Start';}
}

function metroGetCtx(){
  if(!metroAudioCtx)metroAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return metroAudioCtx;
}
function setMetroVolume(v){
  metroVolume=Math.max(0,Math.min(1,v));
  const pct=Math.round(metroVolume*100)+'%';
  ['metro-vol','pdf-metro-vol'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=metroVolume;});
  ['metro-vol-val','pdf-metro-vol-val'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=pct;});
}
function metroClick(accent){
  try{
    const ctx=metroGetCtx();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=accent?1200:900;
    g.gain.setValueAtTime(accent?metroVolume:metroVolume*0.6,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
    o.start();o.stop(ctx.currentTime+0.08);
  }catch(e){}
}
function metroBpm(delta){
  metroBpm_val=Math.max(30,Math.min(240,metroBpm_val+delta));
  for(const id of['metro-bpm','pdf-metro-bpm']){const el=document.getElementById(id);if(el)el.textContent=metroBpm_val;}
  for(const id of['metro-slider','pdf-metro-slider']){const el=document.getElementById(id);if(el)el.value=metroBpm_val;}
  if(metroInterval){clearInterval(metroInterval);metroInterval=setInterval(metroBeat_fn,60000/metroBpm_val);}
}
function metroSetBpm(v){
  metroBpm_val=Math.max(30,Math.min(240,v));
  for(const id of['metro-bpm','pdf-metro-bpm']){const el=document.getElementById(id);if(el)el.textContent=metroBpm_val;}
  for(const id of['metro-slider','pdf-metro-slider']){const el=document.getElementById(id);if(el)el.value=metroBpm_val;}
  if(metroInterval){clearInterval(metroInterval);metroInterval=setInterval(metroBeat_fn,60000/metroBpm_val);}
}
function metroBeat_fn(){
  metroBeat=(metroBeat%metroBeats)+1;
  const accent=metroBeat===1;
  metroClick(accent);
  for(const id of['metro-beat','pdf-metro-beat2']){
    const dot=document.getElementById(id);
    if(dot){dot.classList.add('flash');setTimeout(()=>dot&&dot.classList.remove('flash'),80);}
  }
}
function metroToggle(){
  if(metroInterval){
    clearInterval(metroInterval);metroInterval=null;metroBeat=0;
    for(const id of['metro-start-btn','pdf-metro-btn']){
      const btn=document.getElementById(id);
      if(btn){btn.textContent='▶ Start';if(id==='metro-start-btn'){btn.className='btn btn-primary';btn.style.fontSize='13px';btn.style.padding='6px 16px';}}
    }
  } else {
    metroBeat_fn();
    metroInterval=setInterval(metroBeat_fn,60000/metroBpm_val);
    for(const id of['metro-start-btn','pdf-metro-btn']){
      const btn=document.getElementById(id);
      if(btn){btn.textContent='■ Stop';if(id==='metro-start-btn'){btn.className='btn btn-ghost';btn.style.fontSize='13px';btn.style.padding='6px 16px';}}
    }
  }
}
function metroTap(){
  const now=Date.now();
  metroTapTimes=metroTapTimes.filter(t=>now-t<3000);
  metroTapTimes.push(now);
  if(metroTapTimes.length>=2){
    const gaps=[];
    for(let i=1;i<metroTapTimes.length;i++)gaps.push(metroTapTimes[i]-metroTapTimes[i-1]);
    const avg=gaps.reduce((a,b)=>a+b,0)/gaps.length;
    metroSetBpm(Math.round(60000/avg));
  }
}

// ── UPLOAD SCORE PDF ─────────────────────────────────────────────────────────
async function uploadScorePdf(input){
  const file=input.files[0];
  if(!file||!file.name.endsWith('.pdf'))return;
  if(!token||!siteId){alert('Please sign in first.');return;}

  const prog=document.getElementById('upload-progress');
  const btn=document.getElementById('upload-score-btn');
  if(prog){prog.style.display='block';prog.textContent='UPLOADING '+file.name+'…';}
  if(btn)btn.style.opacity='0.5';

  try{
    // Upload directly to Site Assets using the site drive root path
    // This avoids needing to find the drive by name
    const encodedName=encodeURIComponent(file.name);

    // First try: upload via site default drive to SiteAssets folder
    // Second try: upload via the Sites.ReadWrite scope directly
    let item=null;

    if(file.size<4*1024*1024){
      // Simple upload - try site drive SiteAssets path first
      const uploadUrls=[
        `https://graph.microsoft.com/v1.0/sites/${siteId}/drive/root:/SiteAssets/${encodedName}:/content`,
        `https://graph.microsoft.com/v1.0/sites/${siteId}/drive/root:/Site%20Assets/${encodedName}:/content`,
      ];
      for(const url of uploadUrls){
        try{
          const r=await fetch(url,{method:'PUT',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/pdf'},body:file});
          if(r.ok){item=await r.json();break;}
        }catch(e){console.warn('Upload attempt failed:',e.message);}
      }
      if(!item){
        // Fallback: try all drives
        const drives=await gGet(`https://graph.microsoft.com/v1.0/sites/${siteId}/drives`);
        console.log('Available drives:',(drives.value||[]).map(d=>d.name).join(', '));
        const drive=(drives.value||[])[0]; // use first available drive
        if(!drive)throw new Error('No drives found on this SharePoint site');
        const r=await fetch(
          `https://graph.microsoft.com/v1.0/drives/${drive.id}/root:/${encodedName}:/content`,
          {method:'PUT',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/pdf'},body:file}
        );
        if(!r.ok){const e=await r.json();throw new Error(e.error?.message||`Upload failed (${r.status})`);}
        item=await r.json();
      }
      if(item){
        allSiteFiles.unshift({
          name:file.name,
          displayName:cleanFileName(file.name),
          id:item.id,
          webUrl:item.webUrl,
          downloadUrl:item['@microsoft.graph.downloadUrl']||null,
          listItemId:item.id
        });
      }
    } else {
      // Large file: create upload session via site drive
      const sessionUrls=[
        `https://graph.microsoft.com/v1.0/sites/${siteId}/drive/root:/SiteAssets/${encodedName}:/createUploadSession`,
        `https://graph.microsoft.com/v1.0/sites/${siteId}/drive/root:/Site%20Assets/${encodedName}:/createUploadSession`,
      ];
      let session=null;
      for(const url of sessionUrls){
        try{
          const r=await fetch(url,{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({item:{'@microsoft.graph.conflictBehavior':'rename'}})});
          if(r.ok){session=await r.json();break;}
        }catch(e){console.warn(e.message);}
      }
      if(!session)throw new Error('Could not create upload session');
      const CHUNK=5*1024*1024;
      let start=0;
      while(start<file.size){
        const end=Math.min(start+CHUNK,file.size);
        const chunk=file.slice(start,end);
        if(prog)prog.textContent=`UPLOADING… ${Math.round(end/file.size*100)}%`;
        const r=await fetch(session.uploadUrl,{method:'PUT',headers:{'Content-Range':`bytes ${start}-${end-1}/${file.size}`,'Content-Length':chunk.size},body:chunk});
        if(r.ok&&end===file.size){
          item=await r.json();
          if(item)allSiteFiles.unshift({name:file.name,displayName:cleanFileName(file.name),id:item.id,webUrl:item.webUrl,downloadUrl:null,listItemId:item.id});
        }
        start=end;
      }
    }

    if(prog){prog.textContent='✓ UPLOADED SUCCESSFULLY';prog.style.color='#6ade90';}
    setTimeout(()=>{if(prog){prog.style.display='none';prog.style.color='#4a9e6a';}},2500);
    if(btn)btn.style.opacity='1';
    // Refresh the search to show the new file
    const searchEl=document.getElementById('pdf-search');
    if(searchEl)filterPdfList();
    input.value=''; // reset file input
  }catch(e){
    if(prog){prog.textContent='ERROR: '+e.message;prog.style.color='#ef9070';}
    setTimeout(()=>{if(prog){prog.style.display='none';prog.style.color='#4a9e6a';}},4000);
    if(btn)btn.style.opacity='1';
    input.value='';
  }
}

// ── DRAWING ENGINE ────────────────────────────────────────────────────────────
let drawTool='pen',drawColor='#e03030',drawWidth=4;
let drawingActive=false;
// annotations: {pageNum: [{tool,color,width,points:[{x,y}],erased?:bool}]}
let annotations={};

function setDrawTool(tool){
  drawTool=tool;
  document.getElementById('draw-pen-btn').style.background=tool==='pen'?'#5a2010':'#2a1810';
  document.getElementById('draw-hl-btn').style.background=tool==='highlight'?'#5a4010':'#2a1810';
  document.getElementById('draw-erase-btn').style.background=tool==='eraser'?'#2a2a2a':'#2a1810';
}

function getPos(canvas,e){
  const r=canvas.getBoundingClientRect();
  const scaleX=canvas.width/r.width;
  const scaleY=canvas.height/r.height;
  const src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*scaleX,y:(src.clientY-r.top)*scaleY};
}

function setupDrawing(canvas){
  let currentStroke=null;
  const pageNum=+canvas.dataset.page;

  function start(e){
    e.preventDefault();
    drawingActive=true;
    const pos=getPos(canvas,e);
    if(drawTool==='eraser'){
      eraseAt(canvas,pos,pageNum);
      return;
    }
    currentStroke={tool:drawTool,color:drawColor,width:drawWidth,points:[pos]};
    if(!annotations[pageNum])annotations[pageNum]=[];
    annotations[pageNum].push(currentStroke);
    drawStrokeSeg(canvas,pos,pos,currentStroke);
  }

  function move(e){
    e.preventDefault();
    if(!drawingActive)return;
    const pos=getPos(canvas,e);
    if(drawTool==='eraser'){
      eraseAt(canvas,pos,pageNum);
    } else if(currentStroke){
      const prev=currentStroke.points[currentStroke.points.length-1];
      currentStroke.points.push(pos);
      drawStrokeSeg(canvas,prev,pos,currentStroke);
    }
  }

  function end(e){
    e.preventDefault();
    drawingActive=false;
    currentStroke=null;
    saveAnnotationsToStorage();
  }

  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',end,{passive:false});
}

function drawStrokeSeg(canvas,from,to,stroke){
  const ctx=canvas.getContext('2d');
  ctx.save();
  if(stroke.tool==='highlight'){
    ctx.globalAlpha=0.35;
    ctx.globalCompositeOperation='multiply';
    ctx.strokeStyle=stroke.color;
    ctx.lineWidth=stroke.width*4;
  } else {
    ctx.globalAlpha=1;
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=stroke.color;
    ctx.lineWidth=stroke.width;
  }
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(from.x,from.y);ctx.lineTo(to.x,to.y);ctx.stroke();
  ctx.restore();
}

function eraseAt(canvas,pos,pageNum){
  const r=drawWidth*6;
  // Erase visually
  const ctx=canvas.getContext('2d');
  ctx.clearRect(pos.x-r,pos.y-r,r*2,r*2);
  // Remove strokes from data model that intersect the eraser area
  if(annotations[pageNum]){
    annotations[pageNum]=annotations[pageNum].filter(stroke=>{
      // Keep stroke if none of its points are in the eraser area
      return!stroke.points.some(pt=>
        Math.abs(pt.x-pos.x)<r&&Math.abs(pt.y-pos.y)<r
      );
    });
  }
  // Redraw remaining strokes cleanly so partial erases look right
  const overlayCanvas=canvas;
  ctx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  restoreAnnotations(overlayCanvas,pageNum);
}

function restoreAnnotations(canvas,pageNum){
  const strokes=annotations[pageNum]||[];
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const stroke of strokes){
    if(stroke.points.length===0)continue;
    ctx.save();
    if(stroke.tool==='highlight'){
      ctx.globalAlpha=0.35;
      ctx.globalCompositeOperation='multiply';
      ctx.strokeStyle=stroke.color;
      ctx.lineWidth=stroke.width*4;
    } else {
      ctx.globalAlpha=1;
      ctx.globalCompositeOperation='source-over';
      ctx.strokeStyle=stroke.color;
      ctx.lineWidth=stroke.width;
    }
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(stroke.points[0].x,stroke.points[0].y);
    for(let i=1;i<stroke.points.length;i++){
      ctx.lineTo(stroke.points[i].x,stroke.points[i].y);
    }
    ctx.stroke();
    ctx.restore();
  }
}

function clearAnnotations(){
  if(!confirm('Clear all annotations on this spread?'))return;
  const overlays=document.querySelectorAll('#pdf-spread canvas[data-page]');
  overlays.forEach(c=>{
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height);
    delete annotations[+c.dataset.page];
  });
  saveAnnotationsToStorage();
}

function saveAnnotationsToStorage(){
  try{
    localStorage.setItem('annot_'+selId,JSON.stringify(annotations));
  }catch(e){}
}

function loadAnnotationsFromStorage(){
  try{
    const saved=localStorage.getItem('annot_'+selId);
    annotations=saved?JSON.parse(saved):{};
  }catch(e){annotations={};}
}
